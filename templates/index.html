<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progression Mensuelle FFTT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏓 Progression Mensuelle FFTT</h1>
        </header>

        <div class="config-panel">
            <div class="config-row">
                <div class="config-field">
                    <label for="ecartMin">Progression minimale:</label>
                    <input type="number" id="ecartMin" value="" min="-500" max="500" placeholder="Laisser vide pour tous" />
                </div>
            </div>
        </div>

        <div class="toolbar">
            <button id="loadBtn" class="btn btn-primary">
                <span class="btn-icon">🔄</span>
                Charger les Joueurs
            </button>
            <button id="copyBtn" class="btn btn-secondary" disabled>
                <span class="btn-icon">📋</span>
                Copier tout
            </button>
        </div>

        <div id="infoPanel" class="info-panel">
            <p id="infoText">Cliquez sur "Charger les Joueurs" pour démarrer...</p>
        </div>

        <div id="loadingSpinner" class="loading-spinner" style="display: none;">
            <div class="spinner"></div>
            <p>Récupération des données FFTT en cours...</p>
        </div>

        <div class="table-container">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Licence</th>
                        <th>Prénom</th>
                        <th>Nom</th>
                        <th>Points Classement</th>
                        <th>Points Proposés</th>
                        <th>Progression</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="6" class="empty-state">Aucune donnée à afficher</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mobile-results" id="mobileResults">
            <p style="text-align: center; color: #6c757d; font-style: italic; padding: 20px;">Aucune donnée à afficher</p>
        </div>

        <footer>
            <div id="status" class="status">Prêt</div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
